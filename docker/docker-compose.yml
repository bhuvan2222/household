services:
  postgres:
    image: postgres:16-alpine
    container_name: household-expense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: household_expense
    ports:
      - "5432:5432"
    volumes:
      - household_expense_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d household_expense"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  household_expense_pgdata:
