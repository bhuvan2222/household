name: Keep Render Awake

on:
  schedule:
    # Avoid :00/:10/... boundaries where GitHub schedule queues are often busiest.
    - cron: "3-59/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -fsS --max-time 20 "https://household-5pnk.onrender.com/health" || true
